name: Alert Stale Items from GitHub

on:
  workflow_dispatch:
  push: 
    branches:
      - feature/stale-items-report
  
jobs:
  alert_stale_items:
    name: Alert on Stale items in github
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Changes
        uses: actions/checkout@24cb9080177205b6e8c946b17badbe402adc938f
        with:
          fetch-depth: 0
      - name: Get Stale branches
        id: StaleBranches
        run: echo "Issues=$(./.github/scripts/stale_items_report/oldbranches.sh)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Get stale issues
        id: staleIssues
        shell: pwsh
        run: echo "Issues=$(./.github/scripts/stale_items_report/StaleIssues.ps1)" >> $GITHUB_OUTPUT
      
      - name: Get stale pull requests
        id: StalePRs
        shell: pwsh
        run: echo "Pull Requests=$(./.github/scripts/stale_items_report/StalePullRequests.ps1)" >> $GITHUB_OUTPUT
          
      


