name: Alert Stale Items from GitHub

on:
  workflow_dispatch:
  push: 
    branches:
      - feature/stale-items-report
  
jobs:
  alert_stale_items:
    name: Alert on Stale items in github
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Changes
        uses: actions/checkout@24cb9080177205b6e8c946b17badbe402adc938f
        with:
          fetch-depth: 0

      - name: Get Stale prs
        id: PullRequests
        shell: pwsh
        run: |
          ./.github/scripts/stale_items_report/StalePullRequests.ps1
         

      - name: Get Stale prs
        id: PullRequestsShow
        shell: pwsh
        run: |
         echo  ${env:Stale_pullrequests} >> file.txt
        
      - name: Get Stale prs
        id: PullRequestsprint
        shell: pwsh
        run: |
         cat file.txt


