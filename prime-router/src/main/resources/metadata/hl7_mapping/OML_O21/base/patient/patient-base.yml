# $schema: ./../../../../../../../../../metadata/json_schema/fhir/fhir-to-hl7-mapping.json

elements:

  # x-base.yml indicates that it is a node which continues to branch. patient-visit.yml is a node but does not
  # continue to branch, so it is not named base.
  - name: patient
    required: true
    schema: classpath:/metadata/hl7_mapping/OML_O21/base/patient/patient.yml

  - name: patient-visit
    resource: 'Bundle.entry.resource.ofType(Encounter)'
    condition: '%resource.count() = 1' # this is count() = 1 in ORU, could be because if it's not matching 1 then it
    # will ignore and this is how to say "optional but not repeating"
    schema: classpath:/metadata/hl7_mapping/OML_O21/base/patient/patient-visit.yml