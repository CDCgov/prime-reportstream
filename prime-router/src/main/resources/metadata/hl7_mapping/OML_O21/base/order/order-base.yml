# $schema: ./../../../../../../../../../metadata/json_schema/fhir/fhir-to-hl7-mapping.json

elements:

  - name: observation-request-observation
    schema: classpath:/metadata/hl7_mapping/OML_O21/base/order/observation-request/observation-request-base.yml

  # ORC is required, but together, can't require either only SR or DR by itself
  - name: common-order
    required: true
    schema: classpath:/metadata/hl7_mapping/OML_O21/base/order/common-order.yml

# multiples allowed
  - name: order-participant-information
    resource: 'Bundle.entry.resource.ofType(Device).where(udiCarrier.exists())' # correct?
    constants:
      hl7SegmentGroup: '/ORDER/PRT'
    schema: classpath:/metadata/hl7_mapping/resources/Device/PRT.yml
  #    resourceIndex: prtDeviceIndex #needed?