# $schema: ./../../../../../../../../../metadata/json_schema/fhir/fhir-to-hl7-mapping.json

constants:
  observationPath: '%resource.supportingInfo.resolve()'
#    resource: '%resource.supportingInfo.resolve().where(subject.resolve().id = %resource.subject.resolve().id)'

elements:

  - name: observation-result
    resource: '%resource.supportingInfo.resolve()'
    # todo this conditional was causing observations to not get converted back??
#    condition: '%resource.resourceType = "Observation"' # todo, if fhir sender, supportinginfo could be any type
    required: false # todo set back to true # todo how to ensure it's only true when we're coming down in here? condition when calling the base?
    schema: classpath:/metadata/hl7_mapping/resources/Observation/OBX.yml
    resourceIndex: resultIndex
    constants:
      hl7OBXField: '/ORDER(%{orderIndex})/OBSERVATION_REQUEST/OBSERVATION(%{resultIndex})/OBX'
      hl7ObservationPath: '/ORDER(%{orderIndex})/OBSERVATION_REQUEST/OBSERVATION(%{resultIndex})'

  - name: observation-participation-information
    resource: '%observationPath.device.resolve().where(udiCarrier.exists())' # correct?
    constants:
      hl7SegmentGroup: '/ORDER(%{orderIndex})/OBSERVATION_REQUEST/OBSERVATION(%{resultIndex})'
    schema: classpath:/metadata/hl7_mapping/resources/Device/PRT.yml