# $schema: ./../../../../../../../../../metadata/json_schema/fhir/fhir-to-hl7-mapping.json

elements:

  - name: encounter-pv1
    required: true
    constants:
      hl7PV1Field: '/PATIENT/PATIENT_VISIT/PV1'
    schema: classpath:/metadata/hl7_mapping/resources/Encounter/PV1.yml

  - name: encounter-pv2
    constants:
      hl7PV2Field: '/PATIENT/PATIENT_VISIT/PV2'
    schema: classpath:/metadata/hl7_mapping/resources/Encounter/PV2.yml

  - name: patient-visit-participation-information
    resource: 'Bundle.entry.resource.ofType(Device).where(udiCarrier.exists())' # correct?
    constants:
      hl7SegmentGroup: '/PATIENT/PATIENT_VISIT/PRT'
    schema: classpath:/metadata/hl7_mapping/resources/Device/PRT.yml
#    resourceIndex: prtDeviceIndex #needed?