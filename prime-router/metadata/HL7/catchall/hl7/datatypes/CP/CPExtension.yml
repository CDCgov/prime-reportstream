# $schema: ./../../../../../json_schema/fhir/hl7-to-fhir-mapping-resource-template.json

url:
  type: STRING
  valueOf: $cpExtensionName

extension:
  expressionType: nested
  generateList: true
  expressions:
    - expressionType: nested
      vars:
        cp1: STRING_ALL, CP.1
      condition: $cp1 NOT_NULL
      expressionsMap:
        url:
          type: STRING
          value: CP.1.1 # todo rename these copy pasted names?, old file, check for other old pattersn
        valueDecimal:
          type: STRING
          expressionType: HL7Spec
          valueOf: CP.1.1
    - expressionType: nested
      vars:
        cp1: STRING_ALL, CP.1
      condition: $cp1 NOT_NULL
      expressionsMap:
        url:
          type: STRING
          value: CP.1.2
        valueString:
          type: STRING
          expressionType: HL7Spec
          valueOf: CP.1.2
    - expressionType: nested
      vars:
        cp2: STRING, CP.2
      condition: $cp2 NOT_NULL
      expressionsMap:
        url:
          type: STRING
          valueOf: CP.2
        valueString:
          type: STRING
          expressionType: HL7Spec
          valueOf: CP.2
    - expressionType: nested
      vars:
        cp3: STRING, CP.3
      condition: $cp3 NOT_NULL
      expressionsMap:
        url:
          type: STRING
          valueOf: CP.3
        valueDecimal:
          type: STRING
          expressionType: HL7Spec
          valueOf: CP.3
    - expressionType: nested
      vars:
        cp4: STRING, CP.4
      condition: $cp4 NOT_NULL
      expressionsMap:
        url:
          type: STRING
          valueOf: CP.4
        valueDecimal:
          type: STRING
          expressionType: HL7Spec
          valueOf: CP.4
    - expressionType: nested
      vars:
        cp5: STRING_ALL, CP.5
      condition: $cp5 NOT_NULL
      expressionsMap:
        url:
          type: STRING
          value: CP.5
        valueCodeableConcept:
          valueOf: datatypes/CWE/CodeableConcept
          specs: CP.5
          expressionType: resource
    - expressionType: nested
      vars:
        cp6: STRING, CP.6
      condition: $cp6 NOT_NULL
      expressionsMap:
        url:
          type: STRING
          valueOf: CP.6
        valueString:
          type: STRING
          expressionType: HL7Spec
          valueOf: CP.6
