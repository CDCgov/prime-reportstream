value:
  type: STRING
  expressionType: HL7Spec
  valueOf: DLN.1

type:
  condition: $dln NOT_NULL
  vars:
    dln: STRING_ALL, DLN
  expressionType: resource
  valueOf: datatype/CodeableConcept_var
  constants:
    code: "DL"
    system: "http://terminology.hl7.org/CodeSystem/v2-0203"

system_cwe4:
  vars:
    cwe1: DLN.2.1
  condition: $cwe1 NULL
  valueOf: DLN.2.4
  type: STRING
  expressionType: HL7Spec

system_cwe1:
  vars:
    cwe1: DLN.2.1
  condition: $cwe1 NOT_NULL
  valueOf: DLN.2.1
  type: STRING
  expressionType: HL7Spec

period:
  expressionType: nested
  expressionsMap:
    end:
      type: STRING
      valueOf: "GeneralUtils.dateTimeWithZoneId(dateTimeIn,ZONEID)"
      expressionType: JEXL
      vars:
        dateTimeIn: DLN.3

extension:
  condition: $dln NOT_NULL
  vars:
    dln: STRING_ALL, DLN
  generateList: true
  expressionType: nested
  expressions:
    - expressionType: nested
      generateList: true
      expressionsMap:
        url:
          type: SYSTEM_URL
          value: dln2-issuer
        valueCodeableConcept:
          valueOf: datatypes/CWE/CodeableConcept
          expressionType: resource
          specs: DLN.2
    - expressionType: nested
      generateList: true
      expressionsMap:
        url:
          type: SYSTEM_URL
          value: hl7-use
        valueString:
          value: "driver-license-number"





