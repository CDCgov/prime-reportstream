hl7Class: ca.uhn.hl7v2.model.v251.message.ORU_R01
extends: ../../ORU_R01/ORU_R01-base
elements:
 #useTestProcessingMode
  - name: processing-id
    condition: true
    value: [ '''T''' ]
    hl7Spec: [ 'MSH-11-1' ]
    
  #receivingApplicationName
  - name: receiving-application-namespace-id
    condition: true
    value: [ '''receiving app name''' ]

  #receivingApplicationOID
  - name: receiving-application-universal-id
    condition: true
    value: [ '''receiving app oid''' ]

  #receivingFacilityName
  - name: receiving-facility-name
    condition: true
    value: [ '''receiving facility name''' ]

  #receivingFacilityOID
  - name: receiving-facility-oid
    condition: true
    value: [ '''receiving facility oid''' ]

  #reportingFacilityName
  - name: receiving-facility-name
    condition: true
    value: [ '''receiving facility name''' ]

  #reportingFacilityId
  - name: receiving-facility-id
    condition: true
    value: [ '''receiving facility id''' ]

  #reportingFacilityIdType
  - name: receiving-facility-id-type
    condition: true
    value: [ '''receiving facility id type''' ]

#messageProfileId
  - name: message-profile-id
    condition: true
    value: [ '''source-message-profile-id''' ]

  #processingModeCode
  - name: processing-mode-code
    condition: true
    value: [ '''processing-mode-code''' ]

#replace
  - name: replace-my-value
    condition: true
    value: [ '''replacing''' ]

#replaceValueAwithB - need to do per field
  - name: override-service-request-code-version
    resource: ' Bundle.entry.resource.ofType(ServiceRequest).code.coding.version'
    condition: '%resource.code = "L"'
    value: [ '"W"' ]
    hl7Spec: [ 'OBR-4-6' ]

  #useBlankInsteadOfUnknown for PID-10 or patient_race
  - name: override-patient-race-identifier
    resource: 'Bundle.entry.resource.ofType(Patient).extension("http://ibm.com/fhir/cdm/StructureDefinition/local-race-cd").value.coding'
    condition: '%resource.code = "UNK" or %resource.code = "ASKU"'
    value: [ '""' ]
    hl7Spec: [ '%{hl7PIDField}-10-1' ]

#defaultAoeToUnknown - would need to add default for each field
  - name: aoe-note-comment-string
    condition: '%resource.value is string'
    value: [ '%resource.code.coding.code + " " + %resource.code.text + ": " + %resource.value' ]
    hl7Spec: [ '%{hl7NteFieldPath}(%{aoeNoteIndex})-3' ]
    default: ['''UNK''']

#Todo: May be better to have a separate constant to reference for the conditional once that is fixed
#usePid14ForPatientEmail
  - name: example-use-pid14
    resource: 'Bundle.entry.resource.ofType(Patient)'
    condition: 'true'
    schema: example-use-pid14
    resourceIndex: orderIndex

#cliaForOutOfStateTesting
  - name:
    condition: 'Bundle.entry.resource.ofType(Observation).performer.resolve().organization.resolve().address.state 
    = null or Bundle.entry.resource.ofType(Observation).performer.resolve().organization.resolve().address.state = ""
    and Bundle.entry.resource.ofType(ServiceRequest).requester.resolve().practitioner.resolve().address.state != null 
    and Bundle.entry.resource.ofType(ServiceRequest).requester.resolve().practitioner.resolve().address.state != ""
    and '
    resource: ''

  #suppressNonNPI do this codnitional for each of these:
  #"ORC-12-1", "OBR-16-1", "ORC-12-9", "OBR-16-9", "ORC-12-13", "OBR-16-13 probably would want to make a schema?"
  - name: ordering-provider
    condition: 'Bundle.entry.resource.ofType(Practitioner).identifier.type.coding.code = "NPI"'
    value: ''
    hl7Spec: [ 'ORC-12-1' ]

  #replaceDiiWithOid - the following two make up this one
  - name: equipment-instance-identifier
    condition: 'Bundle.entry.resource.ofType(Device).identifier.type.coding.code == "DII"'
    value: '2.16.840.1.113883.3.3719'
    hl7Spec: [ 'ORC-18-3' ]

  - name: equipment-instance-identifier
    condition: 'Bundle.entry.resource.ofType(Device).identifier.type.coding.code = "DII"'
    value: 'ISO'
    hl7Spec: [ 'ORC-18-4' ]

